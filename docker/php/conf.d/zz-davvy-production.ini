; Production-oriented defaults for immutable container deployments.
; Keep these conservative and overridable at deploy time if needed.

expose_php = Off

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.save_comments = 1

realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Keep PHP upload ceilings above Laravel-level upload validation limits.
; This avoids 422 "The photo failed to upload." when app constraints allow larger files.
upload_max_filesize = 25M
post_max_size = 25M
